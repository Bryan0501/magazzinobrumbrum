<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>Parcheggio – Team Ufficio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

:root {
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left, 0px);
  --safe-right:  env(safe-area-inset-right, 0px);
  --bg: #020810;
  --panel-bg: #070b14;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background: var(--bg);
  font-family: 'Bebas Neue', sans-serif;
  touch-action: pan-x pan-y;
  -webkit-font-smoothing: antialiased;
}

/* ── SCENE ── */
.scene {
  width:100%; height:100%;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}

/* ── SKY & BUILDING ── */
.sky-wrap {
  flex: 0 0 52%;
  position:relative;
  overflow:hidden;
  background: radial-gradient(ellipse 140% 100% at 50% -10%, #0c1e38 0%, #040c18 60%, #020508 100%);
}

/* stars */
.stars-canvas {
  position:absolute; inset:0;
  pointer-events:none;
}

/* Building */
.building {
  position:absolute;
  bottom:0; left:6%; right:6%;
  height:92%;
  background: linear-gradient(180deg,#070f1e 0%,#0a1325 100%);
  border-left: 2px solid #162440;
  border-right: 2px solid #162440;
  border-top: 2px solid #162440;
  border-radius: 2px 2px 0 0;
  overflow:hidden;
}
.building::before {
  content:'';
  position:absolute; inset:0;
  background:
    repeating-linear-gradient(90deg, transparent, transparent calc(8.33% - 1px), rgba(20,50,90,.3) calc(8.33% - 1px), rgba(20,50,90,.3) 8.33%),
    repeating-linear-gradient(0deg,  transparent, transparent calc(9.09% - 1px), rgba(15,40,75,.25) calc(9.09% - 1px), rgba(15,40,75,.25) 9.09%);
}
.win-grid {
  position:absolute;
  top:8px; bottom:8px; left:8px; right:8px;
  display:grid;
  grid-template-columns: repeat(12,1fr);
  grid-template-rows: repeat(11,1fr);
  gap: 2px 3px;
}
.w { border-radius:1px; background:rgba(15,40,80,.4); }
.w.a { background:rgba(255,215,100,.28); }
.w.c { background:rgba(80,180,255,.2); }
.w.w2{ background:rgba(220,240,255,.28); }

/* Neon sign */
.sign-wrap {
  position:absolute;
  top:-2px; left:50%;
  transform:translateX(-50%);
  background:rgba(3,8,16,.9);
  border:1.5px solid rgba(255,20,80,.35);
  border-top-left-radius:4px;
  border-top-right-radius:4px;
  border-bottom:none;
  padding: 5px 18px 3px;
  white-space:nowrap;
  z-index:3;
}
.sign-text {
  font-family:'Bebas Neue',sans-serif;
  font-size: clamp(18px, 5vw, 28px);
  letter-spacing: clamp(4px, 2vw, 10px);
  color:#ff1a5e;
  text-shadow: 0 0 6px #ff1a5e, 0 0 18px rgba(255,26,94,.8), 0 0 40px rgba(255,26,94,.4);
  animation: neonFlicker 9s ease-in-out infinite;
  display:block;
  line-height:1;
}
.sign-line {
  height:2px;
  background:linear-gradient(90deg,transparent,#ff1a5e 20%,#ff1a5e 80%,transparent);
  box-shadow: 0 0 8px rgba(255,26,94,.6);
  margin-top:2px;
}
@keyframes neonFlicker{0%,100%{opacity:1}91%{opacity:1}92%{opacity:.8}93%{opacity:1}96%{opacity:.9}97%{opacity:1}}

/* lobby entrance */
.lobby {
  position:absolute;
  bottom:0; left:50%;
  transform:translateX(-50%);
  width:60px; height:30px;
  border-left:1.5px solid rgba(180,140,60,.25);
  border-right:1.5px solid rgba(180,140,60,.25);
  border-top:1.5px solid rgba(200,160,70,.3);
  background:rgba(255,180,60,.03);
}

/* ── GROUND ── */
.ground {
  flex: 0 0 48%;
  position:relative;
  background:linear-gradient(180deg, #0b121e 0%, #060a10 100%);
  overflow:hidden;
}
.ground::before {
  content:'';
  position:absolute; inset:0;
  background:
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.012) 39px, rgba(255,255,255,.012) 40px),
    repeating-linear-gradient(0deg, transparent, transparent 24px, rgba(255,255,255,.01) 24px, rgba(255,255,255,.01) 25px);
}

/* divider */
.divider {
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1) 20%,rgba(255,255,255,.1) 80%,transparent);
  flex-shrink:0;
}

/* ── PARKING ROW ── */
.parking-row {
  position:absolute;
  bottom: calc(var(--safe-bottom) + 12px);
  left:0; right:0;
  height:calc(100% - 20px);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:0;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  padding: 0 4px;
  scrollbar-width:none;
}
.parking-row::-webkit-scrollbar { display:none; }

/* scroll hint arrows */
.scroll-hint {
  position:absolute;
  bottom: calc(var(--safe-bottom) + 8px);
  right:10px;
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  color:rgba(255,255,255,.25);
  animation: fadePulse 2.5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes fadePulse{0%,100%{opacity:.3}50%{opacity:.8}}

/* ── SPOT ── */
.spot {
  flex: 0 0 calc(20% - 2px);
  min-width: 68px;
  max-width: 110px;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  position:relative;
  border-left:1.5px solid rgba(255,255,255,.14);
  scroll-snap-align:start;
}
.spot:last-child { border-right:1.5px solid rgba(255,255,255,.14); }

.pnum {
  position:absolute;
  bottom:3px; left:4px;
  font-size:9px;
  color:rgba(255,255,255,.07);
  letter-spacing:1px;
}

/* sign */
.sp-sign {
  position:absolute;
  top:6px;
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:2;
}
.sp-board {
  background:rgba(4,10,22,.95);
  border:1px solid rgba(0,170,255,.3);
  border-radius:4px;
  padding:4px 8px 3px;
  margin-top:10px;
  text-align:center;
  position:relative;
}
.sp-board::before {
  content:'P';
  position:absolute;
  top:-14px; left:50%;
  transform:translateX(-50%);
  width:15px; height:15px;
  background:#0055cc;
  color:white;
  font-size:9px;
  line-height:15px;
  text-align:center;
  border-radius:50%;
}
.sp-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(11px,3vw,15px);
  letter-spacing:2px;
  color:#fff;
  line-height:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:90px;
}
.sp-car {
  font-family:'Share Tech Mono',monospace;
  font-size:6px;
  color:rgba(0,200,255,.65);
  letter-spacing:.8px;
  margin-top:1px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:90px;
}
.sp-pole { width:1.5px; height:16px; background:rgba(80,140,200,.2); }

/* car tap area */
.car-tap {
  width:100%;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  cursor:pointer;
  padding-bottom:4px;
  position:relative;
  animation: carIn .6s ease both;
  -webkit-user-select:none; user-select:none;
  transition: transform .18s, filter .18s;
  /* large tap target */
  min-height:44px;
}
.car-tap:active { transform:scale(.96) translateY(-2px); filter:drop-shadow(0 0 10px rgba(0,200,255,.5)); }

.spot:nth-child(1) .car-tap{animation-delay:.1s}
.spot:nth-child(2) .car-tap{animation-delay:.2s}
.spot:nth-child(3) .car-tap{animation-delay:.3s}
.spot:nth-child(4) .car-tap{animation-delay:.4s}
.spot:nth-child(5) .car-tap{animation-delay:.5s}
@keyframes carIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* tap ripple dot */
.car-tap::after {
  content:'';
  position:absolute;
  top:50%; left:50%;
  width:60px; height:60px;
  background:rgba(0,200,255,.12);
  border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  transition:transform .4s ease, opacity .4s ease;
  opacity:0;
  pointer-events:none;
}
.car-tap:active::after { transform:translate(-50%,-50%) scale(1.8); opacity:0; }

.empty-slot {
  font-family:'Share Tech Mono',monospace;
  font-size:7px;
  letter-spacing:3px;
  color:rgba(255,255,255,.07);
  padding-bottom:20px;
  text-align:center;
  line-height:2;
}

/* ── OVERLAY ── */
.overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.6);
  z-index:80;
  opacity:0; pointer-events:none;
  transition:opacity .3s;
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
}
.overlay.show { opacity:1; pointer-events:all; }

/* ── BOTTOM SHEET PANEL ── */
.inv-panel {
  --ac: #00c8ff;
  position:fixed;
  left:0; right:0; bottom:0;
  height: 88vh;
  height: 88dvh;
  background: var(--panel-bg);
  border-top: 2px solid var(--ac);
  border-radius: 20px 20px 0 0;
  transform: translateY(100%);
  transition: transform .38s cubic-bezier(.32,.72,0,1);
  z-index:100;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  /* respect home indicator */
  padding-bottom: var(--safe-bottom);
  box-shadow: 0 -20px 60px rgba(0,0,0,.8);
}
.inv-panel.open { transform: translateY(0); }
.inv-panel.keyboard-open {
  height: 100% !important;
  border-radius: 0;
}
.inv-panel.search-kb .drag-handle,
.inv-panel.search-kb .ph,
.inv-panel.search-kb .ph-stats,
.inv-panel.search-kb .ph-tabs,
.inv-panel.search-kb .add-sect {
  display: none !important;
}

/* drag handle */
.drag-handle {
  width:36px; height:4px;
  background:rgba(255,255,255,.2);
  border-radius:2px;
  margin: 10px auto 0;
  flex-shrink:0;
}

/* panel header */
.ph {
  padding:10px 18px 10px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.07);
  flex-shrink:0;
  gap:12px;
}
.ph-left {}
.ph-owner {
  font-family:'Bebas Neue',sans-serif;
  font-size:26px;
  letter-spacing:5px;
  color:#fff;
  line-height:1;
}
.ph-owner em { color:var(--ac); font-style:normal; }
.ph-car {
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  color:rgba(255,255,255,.3);
  letter-spacing:2.5px;
  margin-top:2px;
}
.ph-close {
  width:34px; height:34px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  border:none;
  color:rgba(255,255,255,.7);
  font-size:16px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
  transition:background .2s;
  min-width:44px; min-height:44px;
}
.ph-close:active { background:var(--ac); color:#000; }

/* stats */
.ph-stats {
  display:flex; gap:16px;
  padding:6px 18px;
  border-bottom:1px solid rgba(255,255,255,.05);
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  color:rgba(255,255,255,.28);
  flex-shrink:0;
}
.ph-stats b { color:var(--ac); }

/* search */
.ph-search {
  padding:8px 18px;
  border-bottom:1px solid rgba(255,255,255,.05);
  flex-shrink:0;
}
.search-inp {
  width:100%;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  color:#fff;
  padding:10px 14px;
  font-family:'Share Tech Mono',monospace;
  font-size:16px; /* ≥16px prevents iOS zoom */
  outline:none;
  -webkit-appearance:none;
  appearance:none;
  -webkit-border-radius:10px;
  touch-action:manipulation;
  transition:border-color .2s;
}
.search-inp:focus { border-color:var(--ac); }
.search-inp::placeholder { color:rgba(255,255,255,.22); font-size:13px; }

/* tabs */
.ph-tabs {
  display:flex; gap:5px;
  padding:7px 18px;
  border-bottom:1px solid rgba(255,255,255,.05);
  overflow-x:auto;
  scrollbar-width:none;
  flex-shrink:0;
  -webkit-overflow-scrolling:touch;
}
.ph-tabs::-webkit-scrollbar { display:none; }
.ptab {
  padding:5px 12px;
  border-radius:20px;
  font-family:'Share Tech Mono',monospace;
  font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.4);
  background:none;
  white-space:nowrap;
  min-height:34px;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.ptab.active { background:var(--ac); border-color:var(--ac); color:#000; font-weight:bold; }
.ptab:active { opacity:.7; }

/* item list */
.item-list {
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:8px 18px;
  overscroll-behavior:contain;
}
.item-list::-webkit-scrollbar { display:none; }

.inv-item {
  display:flex; align-items:center; gap:10px;
  padding:11px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.06);
  margin-bottom:8px;
  background:rgba(255,255,255,.025);
  transition:background .15s;
  animation:itemIn .28s ease both;
}
@keyframes itemIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.inv-item:active { background:rgba(255,255,255,.07); }
.ii-icon { font-size:22px; flex-shrink:0; width:34px; text-align:center; }
.ii-info { flex:1; min-width:0; }
.ii-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:16px; letter-spacing:1.5px; color:#fff;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ii-cat {
  font-family:'Share Tech Mono',monospace;
  font-size:9px; color:rgba(255,255,255,.28);
  letter-spacing:1px; margin-top:1px;
}
.ii-right { display:flex; align-items:center; gap:5px; flex-shrink:0; }

/* qty buttons – large for thumb */
.qbtn {
  width:34px; height:34px; border-radius:50%;
  border:1px solid rgba(255,255,255,.18);
  background:none; color:#fff;
  font-size:18px; line-height:1;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  min-width:44px; min-height:44px;
}
.qbtn:active { background:var(--ac); border-color:var(--ac); color:#000; transform:scale(.92); }
.qnum {
  font-family:'Share Tech Mono',monospace;
  font-size:15px; min-width:22px; text-align:center;
  color:var(--ac); font-weight:bold;
}
.dbtn {
  width:34px; height:34px; border-radius:8px;
  border:1px solid rgba(255,60,60,.3);
  background:none; color:rgba(255,80,80,.7);
  font-size:14px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  min-width:44px; min-height:44px;
}
.dbtn:active { background:rgba(255,50,50,.8); color:#fff; border-color:transparent; transform:scale(.92); }

.empty-inv {
  text-align:center; padding:40px 20px;
  color:rgba(255,255,255,.2);
  font-family:'Share Tech Mono',monospace;
  font-size:10px; letter-spacing:3px;
}
.empty-inv .ei { font-size:40px; display:block; margin-bottom:12px; }

/* add section */
.add-sect {
  padding:10px 18px calc(10px + var(--safe-bottom));
  border-top:1px solid rgba(255,255,255,.07);
  background:rgba(0,0,0,.55);
  flex-shrink:0;
  position:relative;
  z-index:10;
}
.add-sect h4 {
  font-family:'Share Tech Mono',monospace;
  font-size:9px; letter-spacing:3px; text-transform:uppercase;
  color:rgba(255,255,255,.28); margin-bottom:8px;
}
.emoji-scroll {
  display:flex; gap:5px;
  overflow-x:auto; scrollbar-width:none;
  margin-bottom:8px;
  padding-bottom:2px;
  -webkit-overflow-scrolling:touch;
}
.emoji-scroll::-webkit-scrollbar { display:none; }
.eopt {
  width:36px; height:36px; border-radius:8px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  font-size:17px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0;
  min-width:44px; min-height:44px;
  transition:all .13s;
  -webkit-tap-highlight-color:transparent;
}
.eopt.sel, .eopt:active { background:rgba(0,200,255,.18); border-color:var(--ac); }
.add-row { display:flex; gap:6px; overflow:hidden; }
.add-inp {
  flex:1;
  min-width:0;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px; color:#fff;
  padding:11px 12px;
  font-family:'Share Tech Mono',monospace;
  font-size:16px; /* ≥16 to prevent iOS zoom */
  outline:none;
  -webkit-appearance:none;
  appearance:none;
  transition:border-color .2s;
  min-height:44px;
  /* iOS fixes */
  -webkit-border-radius:10px;
  touch-action:manipulation;
}
.add-inp:focus { border-color:var(--ac); }
.add-inp::placeholder { color:rgba(255,255,255,.2); font-size:12px; }
.add-btn {
  background:var(--ac); border:none; border-radius:10px;
  color:#000; padding:0 18px;
  cursor:pointer; font-family:'Bebas Neue',sans-serif;
  font-size:16px; letter-spacing:2px; white-space:nowrap;
  min-height:44px; min-width:60px;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s, transform .15s;
}
.add-btn:active { opacity:.8; transform:scale(.95); }

/* ── LAMPS ── */
.lamp {
  position:absolute;
  bottom:0; z-index:5;
}
.lpole { width:4px; height:70px; background:linear-gradient(90deg,#2a2a2a,#555,#2a2a2a); margin:0 auto; border-radius:2px; }
.larm  { position:absolute; top:0; width:30px; height:4px; background:#444; border-radius:2px; }
.lbulb { position:absolute; top:4px; width:12px; height:7px; background:rgba(255,228,110,.9); border-radius:2px 2px 4px 4px; box-shadow:0 0 14px 5px rgba(255,210,60,.28),0 0 40px 14px rgba(255,200,60,.09); }

@keyframes twinkle{0%,100%{opacity:inherit}50%{opacity:.08}}

/* ── SCROLL INDICATOR DOTS ── */
.scroll-dots {
  position:absolute;
  bottom:4px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:4px;
  pointer-events:none;
}
.sdot {
  width:4px; height:4px; border-radius:50%;
  background:rgba(255,255,255,.2);
  transition:background .2s, transform .2s;
}
.sdot.active { background:rgba(0,200,255,.8); transform:scale(1.4); }

/* ── DATA BAR ── */
.data-bar {
  position:absolute;
  top:6px; right:8px;
  display:flex; gap:5px;
  z-index:10;
}
.data-btn {
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  border-radius:8px;
  color:rgba(255,255,255,.5);
  font-family:'Share Tech Mono',monospace;
  font-size:8px; letter-spacing:1px;
  padding:5px 8px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:all .15s;
  min-height:30px;
}
.data-btn:active { background:rgba(0,200,255,.2); border-color:rgba(0,200,255,.4); color:#fff; }
.data-btn-reset { border-color:rgba(255,60,60,.2); color:rgba(255,100,100,.4); }
.data-btn-reset:active { background:rgba(255,50,50,.2); border-color:rgba(255,50,50,.4); color:#fff; }


</style>
</head>
<body>

<div class="scene" id="mainScene">

  <!-- SKY + BUILDING -->
  <div class="sky-wrap">
    <canvas class="stars-canvas" id="starsCanvas"></canvas>
    <div class="building">
      <div class="win-grid" id="wgrid"></div>
      <div class="lobby"></div>
      <div class="sign-wrap">
        <span class="sign-text">TEAM UFFICIO</span>
        <div class="sign-line"></div>
      </div>
    </div>

// ── STARS (canvas, crisp on retina) ──
(function(){
  const c = document.getElementById('starsCanvas');
  const wrap = c.parentElement;
  const dpr = window.devicePixelRatio || 1;
  function resize(){
    c.width  = wrap.offsetWidth  * dpr;
    c.height = wrap.offsetHeight * dpr;
    c.style.width  = wrap.offsetWidth  + 'px';
    c.style.height = wrap.offsetHeight + 'px';
    const ctx = c.getContext('2d');
    ctx.scale(dpr,dpr);
    for(let i=0;i<90;i++){
      const x = Math.random()*wrap.offsetWidth;
      const y = Math.random()*wrap.offsetHeight;
      const r = Math.random()*1.2+0.2;
      const a = Math.random()*.7+.15;
      ctx.beginPath();
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fill();
    }
  }
  resize();
})();

// ── BUILDING WINDOWS ──

  const g = document.getElementById('wgrid');

// ── SCROLL DOTS ──
(function(){
  const row = document.getElementById('parkingRow');
  const dots = document.querySelectorAll('.sdot');
  const hint = document.getElementById('scrollHint');
  row.addEventListener('scroll', () => {
    const idx = Math.round(row.scrollLeft / (row.scrollWidth / 5));
    dots.forEach((d,i)=>d.classList.toggle('active',i===idx));
    if(row.scrollLeft>10) hint.style.opacity='0';
  }, {passive:true});
})();

// ── SWIPE GIÙ: CHIUDE TASTIERA ──
(function(){
  const panel = document.getElementById('invPanel');
  let startY=0;
  panel.addEventListener('touchstart',e=>{
    startY = e.touches[0].clientY;
  },{passive:true});
  panel.addEventListener('touchend',e=>{
    const dy = e.changedTouches[0].clientY - startY;
    if(dy>80 && panel.classList.contains('search-kb')) {
      document.activeElement.blur();
    }
  },{passive:true});
})();

// ── DATA ──
const EMOJIS = ['💻','🖥️','🖨️','⌨️','🖱️','📱','🔌','🔋','💾','💿','📀','🗄️','📡','📺','📟','⚡','🔧','🪛','📦','📎'];

const DEFAULT_DRIVERS = {
  daniel:  { name:'DANIEL',  car:'FERRARI 296 GT3',    color:'#ff4040', nextId:1, items:[] },
  giovanni:{ name:'GIOVANNI', car:"ALFA ROMEO 145 '90", color:'#ff3333', nextId:1, items:[] },
  paolo:   { name:'PAOLO',   car:'PEUGEOT 5008 • 2005', color:'#3399ff', nextId:1, items:[] },
  stefano: { name:'STEFANO', car:'BENTLEY CONTINENTAL', color:'#50c878', nextId:1, items:[] },
};

// ── NPOINT.IO CONFIG ──
// 1. Vai su https://www.npoint.io/
// 2. Incolla il JSON di data.json e salva
// 3. Copia l'ID dall'URL (es: da api.npoint.io/abc123 copia "abc123")
// 4. Incollalo qui sotto:
const NPOINT_ID = 'cc103022a61d05b6c970';

// Carica dati da npoint.io (sempre remoto, niente cache locale)
async function loadData() {
  try {
    const res = await fetch('https://api.npoint.io/' + NPOINT_ID);
    if (res.ok) return await res.json();
  } catch(e) {
    console.warn('Fetch npoint fallito', e);
  }
  return JSON.parse(JSON.stringify(DEFAULT_DRIVERS));
}

// Salva dati su npoint.io
let _saveTimer = null;
function saveData() {
  // Debounce: salva su npoint max ogni 1.5s per evitare troppe richieste
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    if (!NPOINT_ID || NPOINT_ID === 'TUO_ID_NPOINT') return;
    try {
      await fetch('https://api.npoint.io/' + NPOINT_ID, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(DRIVERS),
      });
    } catch(e) {
      console.error('Errore salvataggio npoint:', e);
    }
  }, 1500);
}

let DRIVERS = {};
let curDriver = null, activeTab = 'Tutti', selEmoji = '💻';

// Carica dati all'avvio
(async function init() {
  DRIVERS = await loadData();
})();

// Build emoji picker
const emojiRow = document.getElementById('emojiRow');
EMOJIS.forEach(e => {
  const b = document.createElement('button');
  b.className = 'eopt' + (e===selEmoji?' sel':'');
  b.textContent = e;
  b.onclick = () => {
    selEmoji = e;
    document.querySelectorAll('.eopt').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
  };
  emojiRow.appendChild(b);
});

function openPanel(id) {
  curDriver = id;
  activeTab = 'Tutti';
  const d = DRIVERS[id];
  const panel = document.getElementById('invPanel');
  panel.style.setProperty('--ac', d.color);
  document.getElementById('pOwner').innerHTML = `<em>${d.name}</em>`;
  document.getElementById('pCar').textContent = '🚗 ' + d.car;
  document.getElementById('pSearch').value = '';
  renderTabs();
  renderList();
  panel.classList.add('open');
  document.getElementById('overlay').classList.add('show');
  // Scroll item list to top
  document.getElementById('pList').scrollTop = 0;
}

function closePanel() {
  document.getElementById('invPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  curDriver = null;
}

function cats(d) {
  return ['Tutti', ...new Set(d.items.map(i=>i.cat))];
}

function renderTabs() {
  const d = DRIVERS[curDriver];
  const el = document.getElementById('pTabs');
  el.innerHTML = '';
  cats(d).forEach(cat => {
    const n = cat==='Tutti' ? d.items.length : d.items.filter(i=>i.cat===cat).length;
    const b = document.createElement('button');
    b.className = 'ptab' + (cat===activeTab?' active':'');
    b.textContent = cat + (n?` (${n})`:'');
    b.onclick = () => { activeTab=cat; renderTabs(); renderList(); };
    el.appendChild(b);
  });
}

function renderList() {
  if (!curDriver) return;
  const d = DRIVERS[curDriver];
  const q = document.getElementById('pSearch').value.toLowerCase();
  let items = d.items;
  if (activeTab !== 'Tutti') items = items.filter(i=>i.cat===activeTab);
  if (q) items = items.filter(i=>i.name.toLowerCase().includes(q)||i.cat.toLowerCase().includes(q));

  const el = document.getElementById('pList');
  if (!items.length) {
    el.innerHTML = `<div class="empty-inv"><span class="ei">📭</span>NESSUN OGGETTO</div>`;
  } else {
    el.innerHTML = items.map(it=>`
      <div class="inv-item">
        <div class="ii-icon">${it.emoji}</div>
        <div class="ii-info">
          <div class="ii-name">${it.name}</div>
          <div class="ii-cat">${it.cat.toUpperCase()}</div>
        </div>
        <div class="ii-right">
          <button class="qbtn" onclick="chQty('${curDriver}',${it.id},-1)">−</button>
          <span class="qnum">${it.qty}</span>
          <button class="qbtn" onclick="chQty('${curDriver}',${it.id},1)">+</button>
          <button class="dbtn" onclick="delItem('${curDriver}',${it.id})">🗑</button>
        </div>
      </div>`).join('');
  }
  document.getElementById('pTotalQty').textContent   = d.items.reduce((s,i)=>s+i.qty,0);
  document.getElementById('pTotalTypes').textContent = d.items.length;
}

function chQty(did,id,delta){
  const it = DRIVERS[did].items.find(i=>i.id===id);
  if(!it) return;
  it.qty = Math.max(0,it.qty+delta);
  if(!it.qty){ delItem(did,id); return; }
  saveData();
  renderTabs(); renderList();
}

function delItem(did,id){
  DRIVERS[did].items = DRIVERS[did].items.filter(i=>i.id!==id);
  saveData();
  renderTabs(); renderList();
}

function addItem(){
  if(!curDriver) return;
  const d = DRIVERS[curDriver];
  const name = document.getElementById('pName').value.trim();
  const cat  = document.getElementById('pCatIn').value.trim() || 'Altro';
  if(!name){ document.getElementById('pName').focus(); return; }
  d.items.push({id:d.nextId++, emoji:selEmoji, name, cat, qty:1});
  document.getElementById('pName').value  = '';
  document.getElementById('pCatIn').value = '';
  activeTab = 'Tutti';
  saveData();
  renderTabs(); renderList();
  setTimeout(()=>{ document.getElementById('pList').scrollTop=99999; },50);
}

// ── iOS KEYBOARD HANDLING ──
const pNameInput = document.getElementById('pName');
const pCatInput = document.getElementById('pCatIn');

pNameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { pCatInput.focus(); e.preventDefault(); }
});
pCatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { addItem(); pCatInput.blur(); e.preventDefault(); }
});

// Handle iOS visualViewport for keyboard
if (window.visualViewport) {
  const panel = document.getElementById('invPanel');
  const addSect = panel.querySelector('.add-sect');
  let origHeight = 0;

  function onViewportResize() {
    const vvh = window.visualViewport.height;
    const wh = window.innerHeight;
    const keyboardH = wh - vvh;
    if (keyboardH > 100) {
      // Keyboard is open
      const focused = document.activeElement;
      const isSearch = focused && focused.id === 'pSearch';

      if (isSearch) {
        // Ricerca: pannello ancorato al top della viewport visibile
        // Nascondi header/stats/tabs/add tramite CSS class
        panel.classList.add('search-kb');
        panel.style.top = window.visualViewport.offsetTop + 'px';
        panel.style.bottom = 'auto';
        panel.style.height = vvh + 'px';
        panel.classList.add('keyboard-open');
      } else {
        // Aggiungi: comportamento originale dal basso
        panel.classList.remove('search-kb');
        panel.style.top = '';
        panel.style.height = vvh + 'px';
        panel.style.bottom = (wh - vvh - window.visualViewport.offsetTop) + 'px';
        panel.classList.add('keyboard-open');
        if (focused && panel.contains(focused)) {
          setTimeout(() => focused.scrollIntoView({ block: 'center', behavior: 'smooth' }), 80);
        }
      }
    } else {
      // Keyboard closed
      panel.style.height = '';
      panel.style.bottom = '';
      panel.style.top = '';
      panel.classList.remove('keyboard-open');
      panel.classList.remove('search-kb');
    }
  }

  window.visualViewport.addEventListener('resize', onViewportResize);
  window.visualViewport.addEventListener('scroll', onViewportResize);
}

// Prevent iOS rubber-banding on panel itself
document.getElementById('invPanel').addEventListener('touchmove', function(e) {
  const list = document.getElementById('pList');
  if (!list.contains(e.target) && !document.getElementById('emojiRow').contains(e.target) && !document.getElementById('pTabs').contains(e.target)) {
    // Only prevent if not scrolling a scrollable area
    if (e.target.closest('.item-list') || e.target.closest('.emoji-scroll') || e.target.closest('.ph-tabs')) return;
    e.preventDefault();
  }
}, { passive: false });
</script>
